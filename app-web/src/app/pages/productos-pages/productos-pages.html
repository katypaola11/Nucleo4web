<input type="text" [(ngModel)]="buscar">

@if (productos | async; as productos) {
  @for (producto of productos.servicio_medico; track producto.nombre) {

    @if (!buscar || producto.info.precio.includes(buscar)) {

      <div class="card">
        <div class="card-header">{{producto.nombre}}</div>

        <div class="card-body">
          <img [src]="producto.info.imagen" width="200" height="200">
          <br>
          <button (click)="guardar(producto)">Agregar</button>
        </div>

        <div class="card-footer">{{producto.info.precio}}</div>
      </div>

    }

  }
}
